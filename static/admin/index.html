<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RaspNVR — Admin central</title>
  <link rel="stylesheet" href="/static/style.css?v=4">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <h1>RaspNVR Central (mock)</h1>
    </div>
    <div class="topbar-right">
      <a href="/" class="btn-secondary">← Edge local</a>
    </div>
  </header>

  <main class="manage-page">
    <section class="panel">
      <h2>Ajouter un magasin</h2>
      <form id="add-store-form" class="form-grid settings-form" style="max-width:420px">
        <label class="full">Code
          <input name="code" required pattern="[a-z0-9][a-z0-9-]*" placeholder="mag02">
        </label>
        <label class="full">Nom
          <input name="name" required placeholder="Magasin Centre">
        </label>
        <button type="submit">Ajouter</button>
      </form>
      <p id="add-store-msg" class="success-msg" hidden></p>
      <p id="add-store-error" class="error" hidden></p>
    </section>
    <section class="panel">
      <h2>Magasins</h2>
      <div id="stores" class="manage-list"></div>
    </section>
    <section class="panel" id="detail-panel" hidden>
      <h2 id="detail-title">Magasin</h2>
      <form id="edit-store-form" class="form-grid settings-form" style="max-width:420px">
        <label class="full">Nom
          <input name="name" required>
        </label>
        <label class="full">Code
          <input name="code" required pattern="[a-z0-9][a-z0-9-]*">
        </label>
        <button type="submit">Enregistrer</button>
      </form>
      <p id="edit-store-msg" class="success-msg" hidden></p>
      <div id="detail-meta" class="manage-meta"></div>
      <div class="form-grid settings-form" style="max-width:520px">
        <button type="button" id="btn-token" class="btn-secondary">Générer token enregistrement</button>
        <button type="button" id="btn-restart" class="btn-secondary">Redémarrer NVR</button>
        <button type="button" id="btn-upload" class="btn-secondary">Sync enregistrements</button>
      </div>
      <p id="token-msg" class="success-msg" hidden></p>
      <h3>Live</h3>
      <div id="live-grid" class="grid layout-4"></div>
      <h3>Enregistrements distants</h3>
      <ul id="recordings"></ul>
    </section>
  </main>

  <script src="/static/admin/admin.js"></script>
</body>
</html>
